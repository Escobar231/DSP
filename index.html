<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Portal de Dados Nacionais</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.05);
            background: #334155;
        }

        .card a {
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #1e293b;
            margin-top: 20px;
        }
    </style>

</head>

<body>

<header>
    <h1>📊 Portal de Dados Nacionais</h1>
    <p>Acesso rápido a bases de dados brasileiras</p>
</header>

        </div>

        <div class="card">

            <p>Banco Central do Brasil</p>
        </div>

            <p>Dados educacionais</p>
        </div>
